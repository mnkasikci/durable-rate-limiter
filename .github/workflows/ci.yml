name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          # Node 24 ships npm 11, the major that generates package-lock.json here.
          # npm 10 resolves wrangler's optional `@cloudflare/workers-types` peer
          # differently and rejects the lockfile as out of sync.
          node-version: 24
          cache: npm
      - run: npm ci
      # Build first: the example/ Workers import the package through `dist/`,
      # so linting them before a build reports every import as unresolved.
      - run: npm run build
      - run: npm run check
